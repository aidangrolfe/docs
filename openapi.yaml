        apiKeyAuth: []
  /scores/stat-validation:
    get:
      tags:
      - Scores
      summary: Get a three-stage Merkle proof for a single score statistic
      description: |
        This endpoint provides a deep cryptographic proof for one or two statistics within a single scores update. The TxODDS Oracle's data is structured in a three-level Merkle hierarchy:

        1. A main batch contains summaries for multiple fixtures.
        2. Each fixture summary is the root of a sub-tree of all score update events for that fixture.
        3. Each score update event is the root of a sub-tree of all the individual statistics it contains.

        This endpoint returns the full set of proofs needed to connect the stat(s) all the way to the main batch root published on-chain.
        To request a proof for a second stat (for use in two-stat predicates like comparing home vs. away scores), include the optional `statKey2` query parameter.
        With the returned data in hand, the user can execute an on-chain transaction to validate that a supplied `TraderPredicate` with optional `BinaryOperation` holds against the
        supplied stat(s), for example, in the case of the single stat, validating that the team's number of touchdowns exceeded 2 at the end of the first quarter, or,
        in the case of two stats, validating that the scores difference exceeded 2--see the public repository for on-chain examples: https://github.com/txodds/tx-on-chain.
      operationId: getScoresStat-validation
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: query
        description: The ID of the fixture for the scores event.
        required: true
        schema:
          type: integer
          format: int32
      - name: seq
        in: query
        description: The sequence number of the specific scores event within the fixture's
          history.
        required: true
        schema:
          type: integer
          format: int32
      - name: statKey
        in: query
        description: The key identifying the specific statistic to validate (e.g.,
          1 for 'Participant1_Score').
        required: true
        schema:
          type: integer
          format: int32
      - name: statKey2
        in: query
        description: The key identifying an optional second statistic to validate
          for two-stat predicates.
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoresStatValidation'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter fixtureId, Invalid
            value for: query parameter seq, Invalid value for: query parameter statKey,
            Invalid value for: query parameter statKey2'
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Message indicating a valid scores record could not be found.
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /trading/offer:
    post:
      tags:
      - Trading
      - Trading
      summary: Submit a new, signed trade offer
      description: |
        Allows an authenticated user to propose a new trade. The payload must contain the full `offer` object
        and a valid Ed25519 `signature`.

        The server will verify that the `signature` is a valid signature of the Borsh-serialized `offer` data,
        signed by the `traderPubkey` specified within the offer.

        The server also soft-checks that the token balance available in the user token account is sufficient to cover the stake,

        Once validated, the offer is broadcast on the real-time stream.
      operationId: postTradingOffer
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      requestBody:
        description: The trade offer terms plus their cryptographic Base58-encoded
          signature.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitOfferPayload'
        required: true
      responses:
        '201':
          description: The ID of the successfully created offer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferCreatedResponse'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: body'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /trading/accept:
    post:
      tags:
      - Trading
      - Trading
      summary: Accept an existing, signed trade offer
      description: |
        Allows an authenticated user to accept an open offer. The payload must include the `offerId` and a valid
        Ed25519 `signature`.

        The server will verify that the `signature` is a valid signature of the Borsh-serialized `offerId`,
        signed by the `acceptingTraderPubkey`. This cryptographically proves the user's intent to accept the trade.

        The server also soft-checks that the token balance available in the user token account is sufficient to cover their accepting stake,

        If everything is valid, the endpoint immediately returns a `202 Accepted` status and kicks off the asynchronous, on-chain `create_trade` signing protocol.
      operationId: postTradingAccept
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      requestBody:
        description: The ID of the offer being accepted, the acceptor's public key,
          and their Base58-encoded signature.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptOfferPayload'
        required: true
      responses:
        '202':
          description: Confirmation that the acceptance was valid and the on-chain
            signing process has begun.
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: body'
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: Message indicating the trade was already taken or has expired.
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /trading/sign:
    post:
      tags:
      - Trading
      - Trading
      summary: Submit a signature for a trade
      description: |
        Allows an authenticated user to submit their signature for a previously prepared multi-signer trade.
        The server will verify that the `signer` public key in the payload matches the authenticated user's identity.

        This endpoint has two possible success responses:
        1. **202 Accepted**: If the submitted signature is valid but the trade is still awaiting other participants' signatures.
        2. **200 OK**: If this is the final signature required. The service will submit the fully-signed transaction to the network and the response body will contain the on-chain transaction signature.
      operationId: postTradingSign
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      requestBody:
        description: The trade ID, the public key of the signer, and their Base58-encoded
          signature of the transaction message.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitSignaturePayload'
        required: true
      responses:
        '200':
          description: Final signature received. The transaction has been submitted
            to the network. The body contains the transaction signature.
          content:
            text/plain:
              schema:
                type: string
        '202':
          description: Signature was successfully received and stored. Awaiting signatures
            from other participants.
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: body'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: ''
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: ''
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /trading/stream:
    get:
      tags:
      - Trading
      summary: Get a real-time Server-Sent Events stream of trading events
      description: |
        Establishes a long-lived, authenticated Server-Sent Events (SSE) stream for trading.

        The `event` field of the SSE message will identify the message type, and the `data` field
        will be a JSON object corresponding to one of the following schemas:

        * **`NewOffer`**: Broadcast to all users when a new trade is proposed.
        * **`SigningRequest`**: Sent privately to the specific traders involved in a matched trade, prompting them to sign.
        * **`TradeMatched`**: Sent privately to the two traders after their trade is successfully created on-chain.
        * **`Heartbeat`**: Sent periodically to keep the connection alive.
      operationId: getTradingStream
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: Last-Event-ID
        in: header
        description: Optional. The ID of the last event received, to resume the stream
          from that point.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /trading/offers:
    get:
      tags:
      - Trading
      summary: Get all active trading offers, optionally filtered by fixture ID
      description: Returns a JSON array of all active trading offers. Can be optionally
        filtered by a fixture ID.
      operationId: getTradingOffers
      parameters:
      - name: fixtureId
        in: query
        description: If provided, filters the active offers to a single fixture ID.
        required: false
        schema:
          type: integer
          format: int32
      responses:
