Copenapi: 3.1.0
info:
  title: TxODDS off-Chain API for Hybrid on-chain/off-chain TxODDS Oracle
  version: 1.2.3
  description: |2

    ## Overview

    This API provides access and trading based on real-time and historical sports data from the **TxODDS Oracle**.

    It supports two use key cases:

    1. Make proprietary TxODDS available for any funded blockchain users by linking the on-chain `subscribe` transactions with issued time-limited API tokens.
    - The data is canonicalised so that all fixtures, odds, or scores are provably unique--confirmed by on-chain cryptographic proofs.
    - The data is delivered in a request-response or streaming form.
    2. Trading following direct and flexible model allowing users to:
    - submit cryptographically signed College Football and Basketball prediction offers,
    - receive via stream the resulting notifications to paid subscribers over the Trading stream,
    - accept and cryptographically sign the offers (once the trade match is confirmed by the off-chain service, a fully-secure on-chain escrow is created with the matching sides token funds),
    - settle the trades if they have identified a scores record that proves the trade can be resolved in their favour, with escrow funds released into  the winner's account.

    Examples of accessing the accompanying on-chain program are available publicly at: https://github.com/txodds/tx-on-chain.
    It is designed to be used by external services to query data that is cryptographically committed to the blockchain.
    All data returned by the off-chain API is canonicalised such that every single record can be cryptographically proven on-chain to be
    part of the unique and consistent dataset generated by the TxODDS Oracle.

    ## Key Features

    * **Historical Snapshots:** Query the latest state of any market at a specific point in time.
    * **Historical Updates:** Query the updates for any given key such as fixture or market for a given time period.
    * **Live Data Streams:** Real-time, low-latency data feeds using Server-Sent Events (SSE).
    * **On-Chain Validation:** Retrieve Merkle proofs to cryptographically verify data against the on-chain roots.
    * **Peer-to-peer prediction trading:** Offer and accept trades on outcome predictions in a flexible format.
    * **Non-custodial order book trading:** Trade against other liquidity orders placed on the order book using a hybrid off-chain/on-chain model.

    ## How do the users gain access to off-chain data (see more details and examples at: https://github.com/txodds/tx-on-chain)

    1. The user purchases the TxODDS Subscription tokens for SOL at fixed rate using either a script (for example, TypeScript) or the TxODDS website
    that directly execute this transaction against the tx-oracle Solana smart contract. The amount required
    is what is exactly needed or is higher than required for the subsequent `stake` operation. The mint tokens are deposited to the token account
     associated with the user wallet.
    2. The user calls the `stake` instruction on tx-oracle to stake (set aside to our program's safekeeping) a STAKE_AMOUNT.
    3. As a guest, with no prior authentication, the user calls the off-chain API at "https://oracle.txodds.com/auth/guest/start" to get an anonymous JWT token with Guest claims.
    4. The user encrypts it using a single use symmetric key--to be thrown away after the next two steps.
    5. The user passes it to the `subscribe` instruction, which locks the required stake until the subscription ends (this is the current design for when the funds can be unlocked). The payment for the subscription is done from SOL directly, plus usual transaction fee on Solana.
    6. The user activates the subscription with off-chain server at "https://oracle.txodds.com/api/token/activate" to obtain an API token with set expiration.
    7. The user calls the API's as documented below while the subscription is valid.
    8. Once the subscription is expired, the user calls the `unstake` instruction to reclaim back the staked tokens into token account associated with their wallet.
    9. The user can also sell the (unlocked) subscription tokens in their posession back using the program instruction `sell_subscription_token` to recover their initial amount in SOL.
paths:
  /guest/start:
    post:
      tags:
      - Authentication
      summary: Start a new guest session
      description: |
        Initiates a new, anonymous guest session and returns a short-lived JSON Web Token (JWT).
        This token must be provided as a Bearer token in the Authorization header for subsequent calls,
        such as the token activation endpoint.
      operationId: postGuestStart
      responses:
        '200':
          description: A short-lived JWT for the guest session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '500':
          description: Returned if an unexpected error occurs during token issuance.
          content:
            text/plain:
              schema:
                type: string
  /token/activate:
    get:
      tags:
      - Authentication
      summary: Activate and retrieve a new API token
      description: |
        This endpoint activates a user's subscription and issues a long-lived API token.
        It requires proof of a successful on-chain subscription payment, which is provided via a transaction signature ('sig').
        The user's current session JWT is cryptographically verified against a JWT encrypted with a symmetric key and then stored on-chain within that transaction.
        The `key` and `iv` parameters are used to decrypt this on-chain proof.
        If all validations pass, a new API token is generated, persisted, and returned to the user.
      operationId: getTokenActivate
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: sig
        in: query
        description: The Solana transaction signature that confirms the subscription
          payment.
        required: true
        schema:
          type: string
        example: 5kb6gnsSu1inDF9nCVV3WcgKryyBFGFkrYS28Sp1avS8mq6Xcw6iq3yzkBTjmq8bGptgqYTXPmjyWECzKzUxYG3C
      - name: key
        in: query
        description: The Base64Url-encoded symmetric key used for payload encryption.
        required: true
        schema:
          type: string
      - name: iv
        in: query
        description: The Base64Url-encoded initialization vector (IV) for the encryption.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: A newly generated, long-lived API token for the user.
          content:
            text/plain:
              schema:
                type: string
              example: txoracle_api_123abc456def...
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            query parameter sig, Invalid value for: query parameter key, Invalid value
            for: query parameter iv'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: Returned if the on-chain JWT proof does not match the session
            JWT, or other security checks fail.
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Returned if an unexpected error occurs during token issuance.
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
  /token/extend/{newEndTs}:
    post:
      tags:
      - Authentication
      summary: Extend the validity of an existing API token
      description: |
        This endpoint allows a user to extend their current subscription by updating the expiry timestamp on-chain and off-chain.

        It performs the following actions:
        1. Validates that the requested `newEndTs` is valid (in the future, greater than current expiry, and within the 1-year limit).
        2. Calls the `extend_subscription` instruction on the Solana blockchain to update the user's stake account.
        3. Upon on-chain success, updates the `end_ts` of the API token in the off-chain database.

        The user continues to use their existing API token; only its validity period is updated.
      operationId: postTokenExtendNewendts
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: newEndTs
        in: path
        description: The new subscription end timestamp (in seconds) requested by
          the user.
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Success message indicating the subscription has been extended.
          content:
            text/plain:
              schema:
                type: string
              example: Subscription extended successfully.
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter newEndTs'
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: Returned if the extension validation fails (e.g., new timestamp
            is in the past, shorter than current, or exceeds limits).
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Returned if the on-chain transaction fails or an internal database
            error occurs.
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /guest/fixtures/snapshot:
    get:
      tags:
      - Fixtures
      summary: Get the latest snapshots of fixtures upcoming in the next week from
        now, corresponding to freely available stable prices in limited competitions
      operationId: getGuestFixturesSnapshot
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: competitionId
        in: query
        description: Optional. Filter by a specific competition ID.
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fixture'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            query parameter competitionId'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
  /fixtures/snapshot:
    get:
      tags:
      - Fixtures
      summary: Get the latest snapshot of fixtures
      operationId: getFixturesSnapshot
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: startEpochDay
        in: query
        description: Optional. The day the fixtures start. Defaults to the current
          day in UTC.
        required: false
        schema:
          type: integer
      - name: competitionId
        in: query
        description: Optional. Filter by a specific competition ID.
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fixture'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter startEpochDay,
            Invalid value for: query parameter competitionId'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /fixtures/updates/{epochDay}/{hourOfDay}:
    get:
      tags:
      - Fixtures
      summary: Get all fixture updates for a single fixture on a given day
      operationId: getFixturesUpdatesEpochdayHourofday
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: epochDay
        in: path
        description: The day since the Unix epoch
        required: true
        schema:
          type: integer
      - name: hourOfDay
        in: path
        description: The hour of the day (0-23)
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: A list of fixture updates. If no updates are found for the
            given parameters, an empty list is returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fixture'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter epochDay, Invalid
            value for: path parameter hourOfDay'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /fixtures/validation:
    get:
      tags:
      - Fixtures
      summary: Get a Merkle proof for a specific fixture update
      description: |
        Each fixture returned or referenced in the TxODDS Oracle API is part of an hourly batch of fixture updates.
        Blockchain holds the Merkle root (ultimate cryptographic containment proof) of each fixture belonging to that batch.
        This endpoint returns the Merkle proof, i.e., the hashes along the branch of the Merkle tree for the batch up to but not inclusive of that Merkle root.
        The user can then call on-chain validation directly to get a cryptographic validation that a given fixture update was published
        by TxODDS as confirmed by the published Merkle root. This on-chain transaction requires the fixture record and the Merkle proof returned here.
      operationId: getFixturesValidation
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: query
        description: The ID of the fixture to validate.
        required: true
        schema:
          type: integer
          format: int64
      - name: timestamp
        in: query
        description: Optional. A Unix timestamp (ms) to get the validation proof for
          a specific point in time. Defaults to now.
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureValidation'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter fixtureId, Invalid
            value for: query parameter timestamp'
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Message indicating a valid update could not be found.
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /fixtures/batch-validation:
    get:
      tags:
      - Fixtures
      summary: Get a Merkle proof for an entire hourly batch of fixtures
      description: |
        Fixture data is grouped into hourly batches. Each batch is represented by a Merkle Tree, and its root hash is published on-chain.
        This Merkle root is contained within the batch's metadata.

        This endpoint allows you to validate the integrity of the batch metadata itself. It returns the metadata for the specified hourly batch, along with a Merkle proof.

        A user can take this proof and the metadata (which includes the final Merkle root) and use it to verify against a higher-level tree or commitment, thus cryptographically proving the integrity of the entire batch's claimed state.
      operationId: getFixturesBatch-validation
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: epochDay
        in: query
        description: The day since the Unix epoch for the desired batch.
        required: true
        schema:
          type: integer
      - name: hourOfDay
        in: query
        description: The hour of the day (UTC, 0-23) for the desired batch.
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FixtureBatchValidation'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter epochDay, Invalid
            value for: query parameter hourOfDay'
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Message indicating that no batch was found for the given time.
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /guest/odds/snapshot/{fixtureId}:
    get:
      tags:
      - Odds
      summary: Get snapshots of free odds for a fixture
      description: Return the latest odds delayed by 60 seconds for each unique market
        line for a given fixture, but only for freely available competitions. If the
        'asOf' parameter is provided, the snapshots are taken at that point in time
        from historical data. Otherwise, it returns the current live snapshot from
        th eongoing 5-min interval.
      operationId: getGuestOddsSnapshotFixtureid
      parameters:
      - name: fixtureId
        in: path
        description: The ID of the fixture
        required: true
        schema:
          type: integer
          format: int64
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: asOf
        in: query
        description: Optional Unix timestamp (ms) for a historical snapshot. If omitted,
          returns the live snapshot.
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Odds'
        '400':
          description: 'Invalid value for: path parameter fixtureId, Invalid value
            for: header Authorization, Invalid value for: query parameter asOf'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
  /guest/odds/stream:
    get:
      tags:
      - Odds
      summary: Get a real-time Server-Sent Events stream of free odds
      description: |
        A long-lived, public stream of odds updates delayed by 60 seconds for freely available competitions.

        The stream consists of data messages with:
        - An `id` in the format `timestamp:index`.
        - `data` containing a JSON object for a single Odds record.

        This endpoint is intended for guest users and only includes odds from competitions marked as free by the system.
      operationId: getGuestOddsStream
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: query
        description: Optional. Filter the event stream for a single fixture ID.
        required: false
        schema:
          type: integer
          format: int64
      - name: Last-Event-ID
        in: header
        description: Optional. The ID of the last event received, in 'timestamp:index'
          format. If provided, the server will attempt to send historical data since
          this event before joining the live stream.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            query parameter fixtureId'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
  /odds/snapshot/{fixtureId}:
    get:
      tags:
      - Odds
      summary: Get snapshots of the latest odds for a fixture
      description: Return the latest odds for each unique market line for a given
        fixture. If the 'asOf' parameter is provided, the snapshots are taken at that
        point in time from historical data. Otherwise, it returns the current live
        snapshot.
      operationId: getOddsSnapshotFixtureid
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: path
        description: The ID of the fixture
        required: true
        schema:
          type: integer
          format: int64
      - name: asOf
        in: query
        description: Optional Unix timestamp (ms) for a historical snapshot. If omitted,
          returns the live snapshot.
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Odds'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter fixtureId, Invalid
            value for: query parameter asOf'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /odds/updates/{fixtureId}:
    get:
      tags:
      - Odds
      summary: Get currently live odds updates for a single fixture
      description: Return all available odds offers for a single fixture from the
        current, in-memory 5-minute cache.
      operationId: getOddsUpdatesFixtureid
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: path
        description: The ID of the fixture to retrieve live updates for
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Odds'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter fixtureId'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /odds/updates/{epochDay}/{hourOfDay}/{interval}:
    get:
      tags:
      - Odds
      summary: Get a json array of all odd updates from a specific historical 5-minute
        interval
      operationId: getOddsUpdatesEpochdayHourofdayInterval
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: epochDay
        in: path
        description: The day since the Unix epoch
        required: true
        schema:
          type: integer
      - name: hourOfDay
        in: path
        description: The hour of the day (0-23)
        required: true
        schema:
          type: integer
      - name: interval
        in: path
        description: The 0-indexed 5-minute interval within the hour (0-11)
        required: true
        schema:
          type: integer
      - name: fixtureId
        in: query
        description: Optional filter by fixture ID
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Odds'
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: path parameter epochDay, Invalid
            value for: path parameter hourOfDay, Invalid value for: path parameter
            interval, Invalid value for: query parameter fixtureId'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /odds/stream:
    get:
      tags:
      - Odds
      summary: Get a real-time Server-Sent Events stream of odds updates
      description: |
        A long-lived stream of odds updates.

        The stream consists of two types of events:
        1. **Data messages:** These have an `id` in the format `timestamp:index` and `data` containing a JSON object for a single Odds record.
        2. **Heartbeats:** These have an `event` field set to `heartbeat` and may have data like `{"Ts": 12345}`.
      operationId: getOddsStream
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: fixtureId
        in: query
        description: Optional. Filter the event stream for a single fixture ID.
        required: false
        schema:
          type: integer
          format: int64
      - name: Last-Event-ID
        in: header
        description: Optional. The ID of the last event received, to resume the stream.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ''
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: query parameter fixtureId'
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /odds/validation:
    get:
      tags:
      - Odds
      summary: Get a Merkle proof for a specific odds update
      description: |
        Each odds update is part of a batch whose state is committed to the blockchain via a Merkle root.
        This endpoint returns the cryptographic proof for a single odds update, identified by its unique messageId.
        The proof consists of the hashes along the branch of the Merkle tree, which can be used to reconstruct the root.
        A user can then use this proof and the odds record in an on-chain transaction to cryptographically verify that the odds update was
        published by the TxODDS Oracle as confirmed by the on-chain Merkle root.
      operationId: getOddsValidation
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      - name: messageId
        in: query
        description: The unique message ID of the odds update to validate.
        required: true
        schema:
          type: string
      - name: ts
        in: query
        description: Timestamp of the odds message.
        required: true
        schema:
