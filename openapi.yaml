          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'
        '400':
          description: 'Invalid value for: query parameter fixtureId'
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Describes the internal error.
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
  /trading/offer/cancel:
    post:
      tags:
      - Trading
      - Trading
      summary: Cancel an open trade offer
      description: |
        Allows the original creator of an offer to withdraw it from the system.

        The server will verify that the authenticated user is the owner of the specified `offerId`.

        This is an atomic operation. The server will only update the offer's status to 'CANCELLED'
        if the offer's current status is 'OPEN'.

        If successful, the endpoint returns a `200 OK` status, and the offer is immediately
        removed from the pool of available trades.
      operationId: postTradingOfferCancel
      parameters:
      - name: Authorization
        in: header
        description: Bearer token for the user's session JWT.
        required: true
        schema:
          type: string
      - name: X-Api-Token
        in: header
        description: The user's long-lived API token.
        required: true
        schema:
          type: string
      requestBody:
        description: The ID of the offer to be cancelled.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOfferPayload'
        required: true
      responses:
        '200':
          description: Confirmation that the offer was successfully cancelled.
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: 'Invalid value for: header Authorization, Invalid value for:
            header X-Api-Token, Invalid value for: body'
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: Message indicating the offer could not be cancelled (e.g.,
            it was already accepted or did not exist).
          content:
            text/plain:
              schema:
                type: string
      security:
      - httpAuth: []
        apiKeyAuth: []
